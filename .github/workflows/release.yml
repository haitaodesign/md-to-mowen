name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      # 跳过 Playwright 浏览器自动下载（CI 中测试使用 mock，不需要真实浏览器）
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: semantic-release-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: 安装依赖
        run: npm ci

      - name: PII 检查
        run: npm run lint:pii

      - name: 格式检查
        run: npx prettier --check .

      - name: 类型检查
        run: npm run check

      - name: 单元测试
        run: npm test

      - name: 构建
        run: npm run build

      - name: 发布（semantic-release）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run release
