name: CI

on:
  push:
    branches:
      - main
      - dev
      - '[0-9]*-*'
  pull_request:
    branches:
      - main
      - dev

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 安装依赖
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: PII 检查
        run: npm run lint:pii

      - name: 格式检查
        run: npx prettier --check .

      - name: 类型检查
        run: npm run check

      - name: 单元测试
        run: npm test

      - name: 构建
        run: npm run build

      - name: 验证 npm pack
        run: npm pack --dry-run
